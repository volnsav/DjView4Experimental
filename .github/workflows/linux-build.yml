name: Linux Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - all-release
          - all-debug
          - full
      djvu_repo:
        description: "DjVuLibreExperimental repository (owner/name)"
        required: false
        default: ""
        type: string
      djvu_ref:
        description: "DjVuLibreExperimental git ref (branch/tag/sha)"
        required: false
        default: "develop"
        type: string

jobs:
  build_pr:
    name: Release x64
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DjView4Experimental
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: develop
          path: DjVuLibreExperimental

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            g++ \
            make \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            libtiff-dev \
            libgl1-mesa-dev \
            libjpeg-dev \
            zlib1g-dev

      - name: Build and install DjVuLibreExperimental
        run: |
          cd DjVuLibreExperimental
          if [[ -x ./autogen.sh ]]; then
            ./autogen.sh --prefix="$GITHUB_WORKSPACE/djvulibre-prefix"
          else
            ./configure --prefix="$GITHUB_WORKSPACE/djvulibre-prefix"
          fi
          make -j"$(nproc)"
          make install

      - name: Configure
        run: |
          export QMAKE=qmake6
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/djvulibre-prefix/lib/pkgconfig:$GITHUB_WORKSPACE/djvulibre-prefix/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
          ./autogen.sh --disable-nsdejavu --disable-desktopfiles

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: djview-linux-Release-x64
          path: |
            src/djview
            src/release/djview
            src/debug/djview
            djvulibre-prefix/lib/libdjvulibre.so*
          if-no-files-found: error

  build_manual:
    name: ${{ matrix.config }} ${{ matrix.platform }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Release
            platform: x64
            configure_flags: ""
          - config: Debug
            platform: x64
            configure_flags: "--enable-debug"

    steps:
      - name: Select matrix entry by mode
        id: mode_filter
        shell: bash
        run: |
          mode='${{ github.event.inputs.mode }}'
          config='${{ matrix.config }}'
          run=false

          if [[ "$mode" == "x64-release" ]]; then
            [[ "$config" == "Release" ]] && run=true
          elif [[ "$mode" == "all-release" ]]; then
            [[ "$config" == "Release" ]] && run=true
          elif [[ "$mode" == "all-debug" ]]; then
            [[ "$config" == "Debug" ]] && run=true
          elif [[ "$mode" == "full" ]]; then
            run=true
          fi

          echo "run=$run" >> "$GITHUB_OUTPUT"

      - name: Checkout DjView4Experimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.djvu_repo != '' && github.event.inputs.djvu_repo || format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: ${{ github.event.inputs.djvu_ref }}
          path: DjVuLibreExperimental

      - name: Install dependencies
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            g++ \
            make \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            libtiff-dev \
            libgl1-mesa-dev \
            libjpeg-dev \
            zlib1g-dev

      - name: Build and install DjVuLibreExperimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        run: |
          cd DjVuLibreExperimental
          if [[ -x ./autogen.sh ]]; then
            ./autogen.sh --prefix="$GITHUB_WORKSPACE/djvulibre-prefix"
          else
            ./configure --prefix="$GITHUB_WORKSPACE/djvulibre-prefix"
          fi
          make -j"$(nproc)"
          make install

      - name: Configure
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        run: |
          export QMAKE=qmake6
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/djvulibre-prefix/lib/pkgconfig:$GITHUB_WORKSPACE/djvulibre-prefix/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
          ./autogen.sh --disable-nsdejavu --disable-desktopfiles ${{ matrix.configure_flags }}

      - name: Build
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        run: |
          make -j"$(nproc)"

      - name: Upload artifact
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: djview-linux-${{ matrix.config }}-${{ matrix.platform }}
          path: |
            src/djview
            src/release/djview
            src/debug/djview
            djvulibre-prefix/lib/libdjvulibre.so*
          if-no-files-found: error
