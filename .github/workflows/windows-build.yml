name: Windows Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - all-release
          - all-debug
          - full
      djvu_repo:
        description: "DjVuLibreExperimental repository (owner/name)"
        required: false
        default: ""
        type: string

jobs:
  build_pr:
    name: Release x64
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: windows-latest

    steps:
      - name: Checkout DjView4Experimental
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          path: DjVuLibreExperimental

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-x64-windows-${{ hashFiles('.github/workflows/windows-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          .\vcpkg\vcpkg.exe install qtbase:x64-windows

      - name: Build combined bundle
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
        run: |
          cmd /c build_combined_release.bat Release x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: djview-Release-x64
          path: build/Release_x64_strict
          if-no-files-found: error

  build_manual:
    name: ${{ matrix.config }} ${{ matrix.platform }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(
          github.event.inputs.mode == 'x64-release' &&
          '[{"config":"Release","platform":"x64","triplet":"x64-windows","outdir":"Release_x64_strict"}]' ||
          github.event.inputs.mode == 'all-release' &&
          '[{"config":"Release","platform":"x64","triplet":"x64-windows","outdir":"Release_x64_strict"},{"config":"Release","platform":"x86","triplet":"x86-windows","outdir":"Release_Win32_strict"},{"config":"Release","platform":"arm64","triplet":"arm64-windows","outdir":"Release_ARM64_strict"}]' ||
          github.event.inputs.mode == 'all-debug' &&
          '[{"config":"Debug","platform":"x64","triplet":"x64-windows","outdir":"Debug_x64_strict"},{"config":"Debug","platform":"x86","triplet":"x86-windows","outdir":"Debug_Win32_strict"}]' ||
          '[{"config":"Release","platform":"x64","triplet":"x64-windows","outdir":"Release_x64_strict"},{"config":"Debug","platform":"x64","triplet":"x64-windows","outdir":"Debug_x64_strict"},{"config":"Release","platform":"x86","triplet":"x86-windows","outdir":"Release_Win32_strict"},{"config":"Debug","platform":"x86","triplet":"x86-windows","outdir":"Debug_Win32_strict"},{"config":"Release","platform":"arm64","triplet":"arm64-windows","outdir":"Release_ARM64_strict"}]'
        ) }}

    steps:
      - name: Checkout DjView4Experimental
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.djvu_repo != '' && github.event.inputs.djvu_repo || format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          path: DjVuLibreExperimental

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-${{ matrix.triplet }}-${{ hashFiles('.github/workflows/windows-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ matrix.triplet }}-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $packages = @("qtbase:x64-windows")
          if ("${{ matrix.triplet }}" -ne "x64-windows") {
            $packages += "qtbase:${{ matrix.triplet }}"
          }
          .\vcpkg\vcpkg.exe install @packages

      - name: Build combined bundle
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
        run: |
          cmd /c build_combined_release.bat ${{ matrix.config }} ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: djview-${{ matrix.config }}-${{ matrix.platform }}
          path: build/${{ matrix.outdir }}
          if-no-files-found: error
