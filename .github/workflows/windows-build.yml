name: Windows Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
          - both
      djvu_repo:
        description: "DjVuLibreExperimental repository (owner/name)"
        required: false
        default: ""
        type: string

jobs:
  build_pr:
    name: Release x64
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      DJVU_PLATFORM_TOOLSET: v143

    steps:
      - name: Checkout DjView4Experimental
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: develop
          path: DjVuLibreExperimental

      - name: Prepare DjVuLibre third-party sources (jpeg/zlib/tiff)
        shell: pwsh
        run: |
          .\.github\scripts\prepare-djvu-third-party.ps1 -DjvuRoot (Join-Path $env:GITHUB_WORKSPACE "DjVuLibreExperimental")

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-x64-windows-release-${{ hashFiles('.github/cache-keys/windows-vcpkg-key.txt', '.github/vcpkg-triplets/*') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-release-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          $packages = @("qtbase:x64-windows", "qttools:x64-windows", "qtbase:x64-windows-release")
          .\vcpkg\vcpkg.exe --vcpkg-root "$env:GITHUB_WORKSPACE\vcpkg" install --overlay-triplets=.github/vcpkg-triplets @packages

      - name: Sanitize MSVC toolset env
        shell: pwsh
        run: |
          Remove-Item Env:VCVARS_VER -ErrorAction SilentlyContinue

      - name: Build combined bundle
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_TRIPLET: x64-windows-release
          VCPKG_HOST_TRIPLET: x64-windows
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
          DJVU_PLATFORM_TOOLSET: ${{ env.DJVU_PLATFORM_TOOLSET }}
        run: |
          cmd /c .\build_combined_release.bat Release x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: djview-Release-x64
          path: build/Release_x64_strict
          if-no-files-found: error

  build_manual:
    name: ${{ matrix.config }} ${{ matrix.platform }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      DJVU_PLATFORM_TOOLSET: v143
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Release
            platform: x64
            triplet: x64-windows
            outdir: Release_x64_strict
          - config: Debug
            platform: x64
            triplet: x64-windows
            outdir: Debug_x64_strict

    steps:
      - name: Select matrix entry by mode
        id: mode_filter
        shell: pwsh
        run: |
          $mode = '${{ github.event.inputs.mode }}'
          $config = '${{ matrix.config }}'
          $platform = '${{ matrix.platform }}'
          $triplet = '${{ matrix.triplet }}'

          $run = $false
          if ($mode -eq 'x64-release') {
            $run = ($config -eq 'Release' -and $platform -eq 'x64')
          } elseif ($mode -eq 'x64-debug') {
            $run = ($config -eq 'Debug' -and $platform -eq 'x64')
          } elseif ($mode -eq 'both') {
            $run = $true
          }

          $targetTriplet = $triplet
          $hostTriplet = 'x64-windows'
          if ($config -eq 'Release') {
            $targetTriplet = 'x64-windows-release'
          }

          "run=$($run.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "target_triplet=$targetTriplet" >> $env:GITHUB_OUTPUT
          "host_triplet=$hostTriplet" >> $env:GITHUB_OUTPUT

      - name: Checkout DjView4Experimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.djvu_repo != '' && github.event.inputs.djvu_repo || format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: develop
          path: DjVuLibreExperimental

      - name: Prepare DjVuLibre third-party sources (jpeg/zlib/tiff)
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          .\.github\scripts\prepare-djvu-third-party.ps1 -DjvuRoot (Join-Path $env:GITHUB_WORKSPACE "DjVuLibreExperimental")

      - name: Setup vcpkg
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-${{ steps.mode_filter.outputs.target_triplet }}-${{ steps.mode_filter.outputs.host_triplet }}-${{ hashFiles('.github/cache-keys/windows-vcpkg-key.txt', '.github/vcpkg-triplets/*') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ steps.mode_filter.outputs.target_triplet }}-${{ steps.mode_filter.outputs.host_triplet }}-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          $targetTriplet = "${{ steps.mode_filter.outputs.target_triplet }}"
          $hostTriplet = "${{ steps.mode_filter.outputs.host_triplet }}"
          $packages = @("qtbase:$hostTriplet", "qttools:$hostTriplet")
          if ($targetTriplet -ne $hostTriplet) {
            $packages += "qtbase:$targetTriplet"
          }
          .\vcpkg\vcpkg.exe --vcpkg-root "$env:GITHUB_WORKSPACE\vcpkg" install --overlay-triplets=.github/vcpkg-triplets @packages

      - name: Sanitize MSVC toolset env
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          Remove-Item Env:VCVARS_VER -ErrorAction SilentlyContinue

      - name: Build combined bundle
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_TRIPLET: ${{ steps.mode_filter.outputs.target_triplet }}
          VCPKG_HOST_TRIPLET: ${{ steps.mode_filter.outputs.host_triplet }}
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
          DJVU_PLATFORM_TOOLSET: ${{ env.DJVU_PLATFORM_TOOLSET }}
        run: |
          cmd /c .\build_combined_release.bat ${{ matrix.config }} ${{ matrix.platform }}

      - name: Upload artifact
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: djview-${{ matrix.config }}-${{ matrix.platform }}
          path: build/${{ matrix.outdir }}
          if-no-files-found: error
