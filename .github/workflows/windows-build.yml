name: Windows Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
          - both
      djvu_repo:
        description: "DjVuLibreExperimental repository (owner/name)"
        required: false
        default: ""
        type: string

jobs:
  build_pr:
    name: Release x64
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      - name: Checkout DjView4Experimental
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: develop
          path: DjVuLibreExperimental

      - name: Prepare DjVuLibre third-party sources (jpeg/zlib/tiff)
        shell: pwsh
        run: |
          $winRoot = Join-Path $env:GITHUB_WORKSPACE "DjVuLibreExperimental\\windows"
          $tmpRoot = $env:RUNNER_TEMP

          $jpegDir = Join-Path $winRoot "jpeg\\jpeg-6b"
          if (-not (Test-Path $jpegDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "jpeg") | Out-Null
            $jpegTar = Join-Path $tmpRoot "jpegsrc.v6b.tar.gz"
            Invoke-WebRequest -Uri "https://www.ijg.org/files/jpegsrc.v6b.tar.gz" -OutFile $jpegTar
            tar -xzf $jpegTar -C (Join-Path $winRoot "jpeg")
          }

          $zlibDir = Join-Path $winRoot "zlib\\zlib"
          if (-not (Test-Path $zlibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "zlib") | Out-Null
            $zlibTar = Join-Path $tmpRoot "zlib-1.2.13.tar.gz"
            Invoke-WebRequest -Uri "https://zlib.net/fossils/zlib-1.2.13.tar.gz" -OutFile $zlibTar
            tar -xzf $zlibTar -C (Join-Path $winRoot "zlib")
            if (Test-Path (Join-Path $winRoot "zlib\\zlib-1.2.13")) {
              Move-Item -Force (Join-Path $winRoot "zlib\\zlib-1.2.13") $zlibDir
            }
          }

          $tiffLibDir = Join-Path $winRoot "tiff\\tiff\\libtiff"
          if (-not (Test-Path $tiffLibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "tiff") | Out-Null
            $tiffTar = Join-Path $tmpRoot "tiff-4.0.10.tar.gz"
            Invoke-WebRequest -Uri "https://download.osgeo.org/libtiff/tiff-4.0.10.tar.gz" -OutFile $tiffTar
            tar -xzf $tiffTar -C (Join-Path $winRoot "tiff")
            if (Test-Path (Join-Path $winRoot "tiff\\tiff-4.0.10")) {
              Move-Item -Force (Join-Path $winRoot "tiff\\tiff-4.0.10") (Join-Path $winRoot "tiff\\tiff")
            }
          }

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-x64-windows-release-${{ hashFiles('.github/cache-keys/windows-vcpkg-key.txt', '.github/vcpkg-triplets/*') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-release-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          $packages = @("qtbase:x64-windows", "qttools:x64-windows", "qtbase:x64-windows-release")
          .\vcpkg\vcpkg.exe --vcpkg-root "$env:GITHUB_WORKSPACE\vcpkg" install --overlay-triplets=.github/vcpkg-triplets @packages

      - name: Sanitize MSVC toolset env
        shell: pwsh
        run: |
          Remove-Item Env:VCVARS_VER -ErrorAction SilentlyContinue

      - name: Detect DjVu MSVC toolset
        id: djvu_toolset
        shell: pwsh
        run: |
          if ($env:DJVU_PLATFORM_TOOLSET) {
            "toolset=$env:DJVU_PLATFORM_TOOLSET" >> $env:GITHUB_OUTPUT
            Write-Host "Using preconfigured DJVU_PLATFORM_TOOLSET=$env:DJVU_PLATFORM_TOOLSET"
            exit 0
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Error "vswhere.exe not found"
            exit 1
          }
          $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($installPath)) {
            Write-Error "Failed to resolve Visual Studio installation path via vswhere"
            exit 1
          }
          $candidates = @('v145', 'v143', 'v142')
          $vcTrees = @('v180', 'v170', 'v160')
          $toolset = $null
          foreach ($vcTree in $vcTrees) {
            foreach ($v in $candidates) {
              $probe = Join-Path $installPath "MSBuild\Microsoft\VC\$vcTree\Platforms\x64\PlatformToolsets\$v\Toolset.props"
              if (Test-Path $probe) { $toolset = $v; break }
            }
            if ($toolset) { break }
          }
          if (-not $toolset) {
            Write-Error "No supported MSVC toolset found (v145/v143/v142)"
            exit 1
          }
          "toolset=$toolset" >> $env:GITHUB_OUTPUT
          Write-Host "Detected DJVU_PLATFORM_TOOLSET=$toolset"

      - name: Build combined bundle
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_TRIPLET: x64-windows-release
          VCPKG_HOST_TRIPLET: x64-windows
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
          DJVU_PLATFORM_TOOLSET: ${{ steps.djvu_toolset.outputs.toolset }}
        run: |
          cmd /c .\build_combined_release.bat Release x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: djview-Release-x64
          path: build/Release_x64_strict
          if-no-files-found: error

  build_manual:
    name: ${{ matrix.config }} ${{ matrix.platform }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Release
            platform: x64
            triplet: x64-windows
            outdir: Release_x64_strict
          - config: Debug
            platform: x64
            triplet: x64-windows
            outdir: Debug_x64_strict

    steps:
      - name: Select matrix entry by mode
        id: mode_filter
        shell: pwsh
        run: |
          $mode = '${{ github.event.inputs.mode }}'
          $config = '${{ matrix.config }}'
          $platform = '${{ matrix.platform }}'
          $triplet = '${{ matrix.triplet }}'

          $run = $false
          if ($mode -eq 'x64-release') {
            $run = ($config -eq 'Release' -and $platform -eq 'x64')
          } elseif ($mode -eq 'x64-debug') {
            $run = ($config -eq 'Debug' -and $platform -eq 'x64')
          } elseif ($mode -eq 'both') {
            $run = $true
          }

          $targetTriplet = $triplet
          $hostTriplet = 'x64-windows'
          if ($config -eq 'Release') {
            $targetTriplet = 'x64-windows-release'
          }

          "run=$($run.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "target_triplet=$targetTriplet" >> $env:GITHUB_OUTPUT
          "host_triplet=$hostTriplet" >> $env:GITHUB_OUTPUT

      - name: Checkout DjView4Experimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.djvu_repo != '' && github.event.inputs.djvu_repo || format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: develop
          path: DjVuLibreExperimental

      - name: Prepare DjVuLibre third-party sources (jpeg/zlib/tiff)
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          $winRoot = Join-Path $env:GITHUB_WORKSPACE "DjVuLibreExperimental\\windows"
          $tmpRoot = $env:RUNNER_TEMP

          $jpegDir = Join-Path $winRoot "jpeg\\jpeg-6b"
          if (-not (Test-Path $jpegDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "jpeg") | Out-Null
            $jpegTar = Join-Path $tmpRoot "jpegsrc.v6b.tar.gz"
            Invoke-WebRequest -Uri "https://www.ijg.org/files/jpegsrc.v6b.tar.gz" -OutFile $jpegTar
            tar -xzf $jpegTar -C (Join-Path $winRoot "jpeg")
          }

          $zlibDir = Join-Path $winRoot "zlib\\zlib"
          if (-not (Test-Path $zlibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "zlib") | Out-Null
            $zlibTar = Join-Path $tmpRoot "zlib-1.2.13.tar.gz"
            Invoke-WebRequest -Uri "https://zlib.net/fossils/zlib-1.2.13.tar.gz" -OutFile $zlibTar
            tar -xzf $zlibTar -C (Join-Path $winRoot "zlib")
            if (Test-Path (Join-Path $winRoot "zlib\\zlib-1.2.13")) {
              Move-Item -Force (Join-Path $winRoot "zlib\\zlib-1.2.13") $zlibDir
            }
          }

          $tiffLibDir = Join-Path $winRoot "tiff\\tiff\\libtiff"
          if (-not (Test-Path $tiffLibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "tiff") | Out-Null
            $tiffTar = Join-Path $tmpRoot "tiff-4.0.10.tar.gz"
            Invoke-WebRequest -Uri "https://download.osgeo.org/libtiff/tiff-4.0.10.tar.gz" -OutFile $tiffTar
            tar -xzf $tiffTar -C (Join-Path $winRoot "tiff")
            if (Test-Path (Join-Path $winRoot "tiff\\tiff-4.0.10")) {
              Move-Item -Force (Join-Path $winRoot "tiff\\tiff-4.0.10") (Join-Path $winRoot "tiff\\tiff")
            }
          }

      - name: Setup vcpkg
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-${{ steps.mode_filter.outputs.target_triplet }}-${{ steps.mode_filter.outputs.host_triplet }}-${{ hashFiles('.github/cache-keys/windows-vcpkg-key.txt', '.github/vcpkg-triplets/*') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ steps.mode_filter.outputs.target_triplet }}-${{ steps.mode_filter.outputs.host_triplet }}-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          $targetTriplet = "${{ steps.mode_filter.outputs.target_triplet }}"
          $hostTriplet = "${{ steps.mode_filter.outputs.host_triplet }}"
          $packages = @("qtbase:$hostTriplet", "qttools:$hostTriplet")
          if ($targetTriplet -ne $hostTriplet) {
            $packages += "qtbase:$targetTriplet"
          }
          .\vcpkg\vcpkg.exe --vcpkg-root "$env:GITHUB_WORKSPACE\vcpkg" install --overlay-triplets=.github/vcpkg-triplets @packages

      - name: Sanitize MSVC toolset env
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          Remove-Item Env:VCVARS_VER -ErrorAction SilentlyContinue

      - name: Detect DjVu MSVC toolset
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        id: djvu_toolset
        shell: pwsh
        run: |
          if ($env:DJVU_PLATFORM_TOOLSET) {
            "toolset=$env:DJVU_PLATFORM_TOOLSET" >> $env:GITHUB_OUTPUT
            Write-Host "Using preconfigured DJVU_PLATFORM_TOOLSET=$env:DJVU_PLATFORM_TOOLSET"
            exit 0
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Error "vswhere.exe not found"
            exit 1
          }
          $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($installPath)) {
            Write-Error "Failed to resolve Visual Studio installation path via vswhere"
            exit 1
          }
          $candidates = @('v145', 'v143', 'v142')
          $vcTrees = @('v180', 'v170', 'v160')
          $toolset = $null
          foreach ($vcTree in $vcTrees) {
            foreach ($v in $candidates) {
              $probe = Join-Path $installPath "MSBuild\Microsoft\VC\$vcTree\Platforms\x64\PlatformToolsets\$v\Toolset.props"
              if (Test-Path $probe) { $toolset = $v; break }
            }
            if ($toolset) { break }
          }
          if (-not $toolset) {
            Write-Error "No supported MSVC toolset found (v145/v143/v142)"
            exit 1
          }
          "toolset=$toolset" >> $env:GITHUB_OUTPUT
          Write-Host "Detected DJVU_PLATFORM_TOOLSET=$toolset"

      - name: Build combined bundle
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_TRIPLET: ${{ steps.mode_filter.outputs.target_triplet }}
          VCPKG_HOST_TRIPLET: ${{ steps.mode_filter.outputs.host_triplet }}
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
          DJVU_PLATFORM_TOOLSET: ${{ steps.djvu_toolset.outputs.toolset }}
        run: |
          cmd /c .\build_combined_release.bat ${{ matrix.config }} ${{ matrix.platform }}

      - name: Upload artifact
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: djview-${{ matrix.config }}-${{ matrix.platform }}
          path: build/${{ matrix.outdir }}
          if-no-files-found: error
