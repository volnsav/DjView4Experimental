name: Windows Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build profile"
        required: false
        default: x64-release
        type: choice
        options:
          - x64-release
          - all-release
          - all-debug
          - full
      djvu_repo:
        description: "DjVuLibreExperimental repository (owner/name)"
        required: false
        default: ""
        type: string

jobs:
  build_pr:
    name: Release x64
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: windows-latest

    steps:
      - name: Checkout DjView4Experimental
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: develop
          path: DjVuLibreExperimental

      - name: Prepare DjVuLibre third-party sources (jpeg/zlib/tiff)
        shell: pwsh
        run: |
          $winRoot = Join-Path $env:GITHUB_WORKSPACE "DjVuLibreExperimental\\windows"
          $tmpRoot = $env:RUNNER_TEMP

          $jpegDir = Join-Path $winRoot "jpeg\\jpeg-6b"
          if (-not (Test-Path $jpegDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "jpeg") | Out-Null
            $jpegTar = Join-Path $tmpRoot "jpegsrc.v6b.tar.gz"
            Invoke-WebRequest -Uri "https://www.ijg.org/files/jpegsrc.v6b.tar.gz" -OutFile $jpegTar
            tar -xzf $jpegTar -C (Join-Path $winRoot "jpeg")
          }

          $zlibDir = Join-Path $winRoot "zlib\\zlib"
          if (-not (Test-Path $zlibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "zlib") | Out-Null
            $zlibTar = Join-Path $tmpRoot "zlib-1.2.13.tar.gz"
            Invoke-WebRequest -Uri "https://zlib.net/fossils/zlib-1.2.13.tar.gz" -OutFile $zlibTar
            tar -xzf $zlibTar -C (Join-Path $winRoot "zlib")
            if (Test-Path (Join-Path $winRoot "zlib\\zlib-1.2.13")) {
              Move-Item -Force (Join-Path $winRoot "zlib\\zlib-1.2.13") $zlibDir
            }
          }

          $tiffLibDir = Join-Path $winRoot "tiff\\tiff\\libtiff"
          if (-not (Test-Path $tiffLibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "tiff") | Out-Null
            $tiffTar = Join-Path $tmpRoot "tiff-4.0.10.tar.gz"
            Invoke-WebRequest -Uri "https://download.osgeo.org/libtiff/tiff-4.0.10.tar.gz" -OutFile $tiffTar
            tar -xzf $tiffTar -C (Join-Path $winRoot "tiff")
            if (Test-Path (Join-Path $winRoot "tiff\\tiff-4.0.10")) {
              Move-Item -Force (Join-Path $winRoot "tiff\\tiff-4.0.10") (Join-Path $winRoot "tiff\\tiff")
            }
          }

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-x64-windows-${{ hashFiles('.github/workflows/windows-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          .\vcpkg\vcpkg.exe install qtbase:x64-windows

      - name: Build combined bundle
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
        run: |
          cmd /c build_combined_release.bat Release x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: djview-Release-x64
          path: build/Release_x64_strict
          if-no-files-found: error

  build_manual:
    name: ${{ matrix.config }} ${{ matrix.platform }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Release
            platform: x64
            triplet: x64-windows
            outdir: Release_x64_strict
          - config: Debug
            platform: x64
            triplet: x64-windows
            outdir: Debug_x64_strict
          - config: Release
            platform: x86
            triplet: x86-windows
            outdir: Release_Win32_strict
          - config: Debug
            platform: x86
            triplet: x86-windows
            outdir: Debug_Win32_strict
          - config: Release
            platform: arm64
            triplet: arm64-windows
            outdir: Release_ARM64_strict

    steps:
      - name: Select matrix entry by mode
        id: mode_filter
        shell: pwsh
        run: |
          $mode = '${{ github.event.inputs.mode }}'
          $config = '${{ matrix.config }}'
          $platform = '${{ matrix.platform }}'

          $run = $false
          if ($mode -eq 'x64-release') {
            $run = ($config -eq 'Release' -and $platform -eq 'x64')
          } elseif ($mode -eq 'all-release') {
            $run = ($config -eq 'Release')
          } elseif ($mode -eq 'all-debug') {
            $run = ($config -eq 'Debug')
          } elseif ($mode -eq 'full') {
            $run = $true
          }

          "run=$($run.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Checkout DjView4Experimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4

      - name: Checkout DjVuLibreExperimental
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.djvu_repo != '' && github.event.inputs.djvu_repo || format('{0}/DjVuLibreExperimental', github.repository_owner) }}
          ref: develop
          path: DjVuLibreExperimental

      - name: Prepare DjVuLibre third-party sources (jpeg/zlib/tiff)
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          $winRoot = Join-Path $env:GITHUB_WORKSPACE "DjVuLibreExperimental\\windows"
          $tmpRoot = $env:RUNNER_TEMP

          $jpegDir = Join-Path $winRoot "jpeg\\jpeg-6b"
          if (-not (Test-Path $jpegDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "jpeg") | Out-Null
            $jpegTar = Join-Path $tmpRoot "jpegsrc.v6b.tar.gz"
            Invoke-WebRequest -Uri "https://www.ijg.org/files/jpegsrc.v6b.tar.gz" -OutFile $jpegTar
            tar -xzf $jpegTar -C (Join-Path $winRoot "jpeg")
          }

          $zlibDir = Join-Path $winRoot "zlib\\zlib"
          if (-not (Test-Path $zlibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "zlib") | Out-Null
            $zlibTar = Join-Path $tmpRoot "zlib-1.2.13.tar.gz"
            Invoke-WebRequest -Uri "https://zlib.net/fossils/zlib-1.2.13.tar.gz" -OutFile $zlibTar
            tar -xzf $zlibTar -C (Join-Path $winRoot "zlib")
            if (Test-Path (Join-Path $winRoot "zlib\\zlib-1.2.13")) {
              Move-Item -Force (Join-Path $winRoot "zlib\\zlib-1.2.13") $zlibDir
            }
          }

          $tiffLibDir = Join-Path $winRoot "tiff\\tiff\\libtiff"
          if (-not (Test-Path $tiffLibDir)) {
            New-Item -ItemType Directory -Force -Path (Join-Path $winRoot "tiff") | Out-Null
            $tiffTar = Join-Path $tmpRoot "tiff-4.0.10.tar.gz"
            Invoke-WebRequest -Uri "https://download.osgeo.org/libtiff/tiff-4.0.10.tar.gz" -OutFile $tiffTar
            tar -xzf $tiffTar -C (Join-Path $winRoot "tiff")
            if (Test-Path (Join-Path $winRoot "tiff\\tiff-4.0.10")) {
              Move-Item -Force (Join-Path $winRoot "tiff\\tiff-4.0.10") (Join-Path $winRoot "tiff\\tiff")
            }
          }

      - name: Setup vcpkg
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg artifacts
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-${{ matrix.triplet }}-${{ hashFiles('.github/workflows/windows-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ matrix.triplet }}-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        run: |
          $packages = @("qtbase:x64-windows")
          if ("${{ matrix.triplet }}" -ne "x64-windows") {
            $packages += "qtbase:${{ matrix.triplet }}"
          }
          .\vcpkg\vcpkg.exe install @packages

      - name: Build combined bundle
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          DJVU_ROOT: ${{ github.workspace }}\DjVuLibreExperimental
        run: |
          cmd /c build_combined_release.bat ${{ matrix.config }} ${{ matrix.platform }}

      - name: Upload artifact
        if: ${{ steps.mode_filter.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: djview-${{ matrix.config }}-${{ matrix.platform }}
          path: build/${{ matrix.outdir }}
          if-no-files-found: error
